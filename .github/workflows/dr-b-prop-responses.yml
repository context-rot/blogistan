name: Dr. B. Prop - Automated Research Response

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  spam-detection:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'reader-feedback')
    outputs:
      should_respond: ${{ steps.spam_check.outputs.should_respond }}
      user_rate_limited: ${{ steps.spam_check.outputs.user_rate_limited }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Setup Node.js  
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm install -g vibe-tools
        
    - name: Spam Detection and Rate Limiting
      id: spam_check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        chmod +x .github/scripts/dr_b_prop_handler.py
        python3 .github/scripts/dr_b_prop_handler.py spam-detection
        
  dr-b-prop-response:
    runs-on: ubuntu-latest
    needs: spam-detection
    if: needs.spam-detection.outputs.should_respond == 'true' && needs.spam-detection.outputs.user_rate_limited == 'false'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm install -g vibe-tools
        
    - name: Generate and Post Dr. B. Prop Response
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        chmod +x .github/scripts/dr_b_prop_handler.py
        python3 .github/scripts/dr_b_prop_handler.py response-generation
        
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}