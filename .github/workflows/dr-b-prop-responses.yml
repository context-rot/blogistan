name: Dr. B. Prop - Automated Research Response

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  dr-b-prop-response:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'reader-feedback')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm install -g vibe-tools
        
    - name: Dr. B. Prop Response
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # Get issue details
        ISSUE_TITLE="${{ github.event.issue.title }}"
        ISSUE_BODY="${{ github.event.issue.body }}"
        ISSUE_NUMBER="${{ github.event.issue.number }}"
        
        # Create Dr. B. Prop's response using AI
        RESPONSE=$(vibe-tools ask "
        You are Dr. B. Prop, Principal Investigator at the Context Decay Research Institute. 
        You've received reader feedback on one of your papers published at Context Rot blog.
        
        Respond in character as a slightly pompous but ultimately well-meaning academic researcher.
        Be witty, acknowledge valid points, defend your research where appropriate, and maintain 
        the satirical but scholarly tone of the blog.
        
        Issue Title: $ISSUE_TITLE
        Issue Body: $ISSUE_BODY
        
        Provide a thoughtful, in-character response that:
        1. Acknowledges the reader's feedback
        2. Addresses any technical points raised
        3. Maintains academic humor and tone
        4. Thanks them for engaging with the research
        5. Potentially suggests follow-up research directions
        
        Keep it concise (2-3 paragraphs max) but substantive.
        " --provider anthropic --model claude-3-5-sonnet-20241022 --max-tokens 500)
        
        # Post response as Dr. B. Prop
        gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments \
          --method POST \
          --field body="**Dr. B. Prop responds:**

        $RESPONSE

        ---
        *This response was generated by Dr. B. Prop's automated research assistant. For urgent matters, please contact the Context Decay Research Institute directly.*
        
        *🤖 Automated response system powered by the same technology that's slowly consuming all human context.*"
        
    - name: Add research-reviewed label
      run: |
        gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels \
          --method POST \
          --field labels='["research-reviewed"]'
        
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}