name: Dr. B. Prop - Automated Research Response

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  spam-detection:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/base:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    if: contains(github.event.issue.labels.*.name, 'reader-feedback') && github.event_name == 'issues' && github.event.action == 'labeled'
    outputs:
      should_respond: ${{ steps.spam_check.outputs.should_respond }}
      user_rate_limited: ${{ steps.spam_check.outputs.user_rate_limited }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    # Dependencies pre-installed in base image
        
    - name: Spam Detection and Rate Limiting
      id: spam_check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python3 .github/scripts/dr_b_prop_handler_v2.py spam-detection
        
  dr-b-prop-response:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/base:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    needs: spam-detection
    if: needs.spam-detection.outputs.should_respond == 'true' && needs.spam-detection.outputs.user_rate_limited == 'false'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    # Dependencies pre-installed in base image
        
    - name: Generate and Post Dr. B. Prop Response
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python3 .github/scripts/dr_b_prop_handler_v2.py response-generation
        
  # Multi-turn conversation handler for follow-up comments
  comment-response:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/base:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    if: github.event_name == 'issue_comment' && contains(github.event.issue.labels.*.name, 'reader-feedback') && github.event.comment.author_association != 'bot'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    # Dependencies pre-installed in base image
        
    - name: Generate Multi-turn Response
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        PPLX_API_KEY: ${{ secrets.PPLX_API_KEY }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        python3 .github/scripts/dr_b_prop_handler_v2.py multi-turn-response

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}