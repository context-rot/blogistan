<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
  
  <!-- Favicon and app icons -->
  <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon.ico' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/icons/favicon-16x16.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/icons/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="48x48" href="{{ '/assets/icons/favicon-48x48.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/icons/apple-touch-icon.png' | relative_url }}">
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
  <meta name="theme-color" content="#2c3e50">
  <meta name="msapplication-TileColor" content="#2c3e50">
  <meta name="msapplication-TileImage" content="{{ '/assets/icons/favicon-128x128.png' | relative_url }}">
  
  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 200 | escape }}">
  <meta property="og:image" content="{{ '/assets/social-card.png' | absolute_url }}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Context Rot: A Journal of Computational Decay">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  {% if page.layout == 'post' %}
  <meta property="article:author" content="{{ page.authors | default: 'Dr. B. Prop' | join: ', ' }}">
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  <meta property="article:section" content="Computer Science">
  {% endif %}
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@context_rot">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 200 | escape }}">
  <meta name="twitter:image" content="{{ '/assets/social-card.png' | absolute_url }}">
  <meta name="twitter:image:alt" content="Context Rot: A Journal of Computational Decay">
  
  <!-- Additional Meta Tags -->
  <meta name="author" content="{{ page.authors | default: 'Dr. B. Prop' | join: ', ' }}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  
  <!-- Modern Premium Design System -->
  <link rel="stylesheet" href="{{ '/assets/css/modern-premium-style.css' | relative_url }}">
  
  <!-- Selection and comment functionality -->
  <link rel="stylesheet" href="{{ '/assets/css/selection-comments.css' | relative_url }}">
  
  <!-- SEO and feed -->
  {% seo %}
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
  
  <!-- Schema.org structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "{% if page.layout == 'post' %}BlogPosting{% else %}WebPage{% endif %}",
    "headline": "{{ page.title | default: site.title | escape }}",
    "description": "{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}",
    "url": "{{ page.url | absolute_url }}",
    "datePublished": "{% if page.date %}{{ page.date | date_to_xmlschema }}{% else %}{{ site.time | date_to_xmlschema }}{% endif %}",
    "dateModified": "{% if page.last_modified_at %}{{ page.last_modified_at | date_to_xmlschema }}{% else %}{{ page.date | default: site.time | date_to_xmlschema }}{% endif %}",
    "author": {
      "@type": "Person",
      "name": "{{ page.authors | default: site.author.name | default: 'Dr. B. Prop' | join: ', ' }}"
    },
    "publisher": {
      "@type": "Organization",
      "name": "{{ site.title }}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ '/assets/avatar_transparent.png' | absolute_url }}"
      }
    }
    {% if page.layout == 'post' %},
    "articleBody": "{{ page.content | strip_html | normalize_whitespace | escape }}",
    "wordCount": "{{ page.content | strip_html | number_of_words }}",
    "keywords": "{{ page.categories | join: ', ' }}"
    {% endif %}
  }
  </script>
  
  <!-- Privacy-friendly analytics -->
  <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" /></noscript>
</head>

<body class="modern-layout">
  <div class="page-loader"></div>
  <header class="site-header">
    <div class="wrapper">
      <div class="site-header-content">
        <a href="{{ '/' | relative_url }}" class="site-logo">
          <img src="{{ '/assets/avatar_transparent.png' | relative_url }}" alt="Context Rot" class="site-avatar">
          <span class="site-name">Context Rot</span>
        </a>
        
        <nav class="social-nav">
          <a href="https://github.com/context-rot" target="_blank" rel="noopener" class="social-link" aria-label="GitHub">
            <img src="{{ '/assets/images/github-icon.svg' | relative_url }}" alt="GitHub" class="social-icon">
          </a>
          <a href="https://twitter.com/context_rot" target="_blank" rel="noopener" class="social-link" aria-label="Twitter/X">
            <img src="{{ '/assets/images/x-icon.svg' | relative_url }}" alt="Twitter/X" class="social-icon">
          </a>
          <a href="{{ '/feed.xml' | relative_url }}" class="social-link" aria-label="RSS Feed">
            <img src="{{ '/assets/images/rss-icon.svg' | relative_url }}" alt="RSS Feed" class="social-icon">
          </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

  <!-- Selection and comment functionality -->
  <script src="{{ '/assets/js/selection-comments.js' | relative_url }}"></script>
  
  <!-- Demo animations and micro-interactions -->
  <script src="{{ '/assets/js/demo-animations.js' | relative_url }}"></script>
  
  <!-- Paper page auto-demo system -->
  <script src="{{ '/assets/js/paper-auto-demo.js' | relative_url }}"></script>
</body>
</html>
