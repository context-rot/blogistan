<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="entropyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5f6368;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9aa0a6;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="particleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Main geometric shape breaking down -->
  <rect x="16" y="16" width="32" height="32" rx="4" fill="none" stroke="url(#entropyGradient)" stroke-width="2" opacity="0.9"/>
  
  <!-- Partial/broken segments -->
  <rect x="16" y="16" width="10" height="10" rx="2" fill="url(#entropyGradient)" opacity="0.7"/>
  <rect x="38" y="16" width="10" height="6" rx="2" fill="url(#entropyGradient)" opacity="0.5"/>
  <rect x="16" y="38" width="6" height="10" rx="2" fill="url(#entropyGradient)" opacity="0.4"/>
  
  <!-- Scattered particles showing decay -->
  <circle cx="52" cy="20" r="1.5" fill="url(#particleGradient)" opacity="0.6"/>
  <circle cx="56" cy="24" r="1" fill="url(#particleGradient)" opacity="0.4"/>
  <circle cx="54" cy="28" r="0.8" fill="url(#particleGradient)" opacity="0.3"/>
  
  <circle cx="12" cy="52" r="1.2" fill="url(#particleGradient)" opacity="0.5"/>
  <circle cx="8" cy="48" r="0.8" fill="url(#particleGradient)" opacity="0.3"/>
  <circle cx="10" cy="44" r="1" fill="url(#particleGradient)" opacity="0.4"/>
  
  <circle cx="44" cy="56" r="1.3" fill="url(#particleGradient)" opacity="0.4"/>
  <circle cx="48" cy="52" r="0.9" fill="url(#particleGradient)" opacity="0.3"/>
</svg>