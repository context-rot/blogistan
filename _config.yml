# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: "Context Rot: A Journal of Computational Decay"
email: editor@context-rot.com
description: >- # this means to ignore newlines until "baseurl:"
  ArXiv-style preprints exploring the inevitable entropy of context in AI systems,
  presented with all the hype of that new-paper-smell (since that's what gets the X algorithms to pay attention?) and tongue-in-cheek commentary.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://context-rot.com" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: context_rot
github_username: context-rot

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Custom variables
author:
  name: "Dr. B. Prop"
  bio: "Principal Investigator, Context Decay Research Institute"
  
# GitHub integration
repository: context-rot/blogistan

# ArXiv style settings
arxiv_style: true
show_feedback_prompt: true
feedback_prompt: "Spot an error? Have insights? Click any text to leave feedback!"

# SEO and AI optimization settings
lang: en
timezone: America/Los_Angeles
permalink: /:year/:month/:day/:title:output_ext

# Additional SEO tags
twitter:
  username: context_rot
  card: summary_large_image

social:
  name: Context Rot
  links:
    - https://twitter.com/context_rot
    - https://github.com/context-rot

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Dr. B. Prop"
      image: "/assets/social-card.png"
      
# AI/LLM friendly permalinks
tag_permalink_style: pretty

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
